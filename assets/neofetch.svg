<svg xmlns="http://www.w3.org/2000/svg" width="640" height="250" viewBox="0 0 640 250" font-family="'JetBrains Mono','SF Mono',ui-monospace,Menlo,Consolas,monospace">
  <defs>
    <linearGradient id="aurora" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="0.55" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#7ee787"/>
    </linearGradient>
    <linearGradient id="name" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <rect x="0.5" y="0.5" width="639" height="249" rx="14" fill="#0d1117" stroke="#30363d"/>

  <!-- window dots -->
  <circle cx="22" cy="22" r="5" fill="#ff5f56"/>
  <circle cx="40" cy="22" r="5" fill="#ffbd2e"/>
  <circle cx="58" cy="22" r="5" fill="#27c93f"/>

  <!-- prompt -->
  <text x="22" y="56" font-size="13" fill="#6e7681">laura@github:~$ <tspan fill="#e6edf3">neofetch</tspan></text>

  <!-- ASCII cat -->
  <g font-size="13" fill="url(#aurora)" font-weight="700">
    <text x="30" y="92" xml:space="preserve">   .--.</text>
    <text x="30" y="108" xml:space="preserve">  |o_o |</text>
    <text x="30" y="124" xml:space="preserve">  |:_/ |</text>
    <text x="30" y="140" xml:space="preserve"> //   \ \</text>
    <text x="30" y="156" xml:space="preserve">(|     | )</text>
    <text x="30" y="172" xml:space="preserve">/'\_   _/`\</text>
    <text x="30" y="188" xml:space="preserve">\___)=(___/</text>
  </g>

  <!-- info block -->
  <g font-size="13.5">
    <text x="190" y="92" font-weight="700" fill="url(#name)">Laura Piñero Roig</text>
    <text x="190" y="108" fill="#30363d">─────────────────────────────</text>

    <text x="190" y="128"><tspan fill="#a78bfa" font-weight="700">OS</tspan><tspan fill="#8b949e">: </tspan><tspan fill="#c9d1d9">Medicine @ UB · 3rd year</tspan></text>
    <text x="190" y="148"><tspan fill="#a78bfa" font-weight="700">Kernel</tspan><tspan fill="#8b949e">: </tspan><tspan fill="#c9d1d9">Maths + Physics (1st yr) → Medicine</tspan></text>
    <text x="190" y="168"><tspan fill="#22d3ee" font-weight="700">Shell</tspan><tspan fill="#8b949e">: </tspan><tspan fill="#c9d1d9">Python · R</tspan></text>
    <text x="190" y="188"><tspan fill="#22d3ee" font-weight="700">Focus</tspan><tspan fill="#8b949e">: </tspan><tspan fill="#c9d1d9">bioinformatics · ML for health</tspan></text>
    <text x="190" y="208"><tspan fill="#f778ba" font-weight="700">Uptime</tspan><tspan fill="#8b949e">: </tspan><tspan fill="#c9d1d9">La Caixa Fellow (since 2022)</tspan></text>
    <text x="190" y="228"><tspan fill="#f778ba" font-weight="700">Now</tspan><tspan fill="#8b949e">: </tspan><tspan fill="#c9d1d9">open-source tooling + research</tspan></text>
  </g>
</svg>
